<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bekhzod Ikramov | Premium Hub</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preload" href="profile.jpg" as="image" type="image/jpeg">
    
    <style>
        :root {
            /* Dark Mode Defaults */
            --bg-base: #030305;
            --fade-color: rgba(3, 3, 5, 1);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --accent: #ec4899;
        }

        body.light-mode {
            --bg-base: #f8fafc;
            --fade-color: rgba(248, 250, 252, 1);
            --glass-bg: rgba(0, 0, 0, 0.04);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-hover: rgba(0, 0, 0, 0.06);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent: #ec4899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        /* --- IMMERSIVE HERO IMAGE --- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 52vh; /* Katta joyni egallaydi */
            flex-shrink: 0;
            overflow: hidden;
            background-color: #000;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top; /* Yuz qismi va kitoblar to'liq tushishi uchun */
            filter: contrast(1.05) brightness(0.95);
            transform: scale(1);
            animation: slowZoom 25s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Sekinlik bilan fon rangiga singdirish (Cinematic Fade) */
        .hero-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, transparent 0%, var(--fade-color) 100%);
            z-index: 1;
            pointer-events: none;
            transition: background 0.8s ease;
        }

        /* Hover theme toggle */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(20deg);
            background: rgba(0,0,0,0.6);
        }

        /* --- CONTENT SECTION --- */
        .content-section {
            position: relative;
            width: 100%;
            height: 48vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1.5rem 1rem 1.5rem;
            z-index: 10;
            margin-top: -65px; /* Matn rasmni ustiga chiqishi uchun */
        }

        .profile-info {
            text-align: center;
            margin-bottom: 1.2rem;
            width: 100%;
            max-width: 450px;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 2.3rem; 
            font-weight: 600;
            font-style: italic;
            letter-spacing: -0.5px;
            margin-bottom: 0.2rem;
            background: linear-gradient(to right, #fff, #d4d4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 20px rgba(0,0,0,0.8);
            transition: all 0.5s ease;
        }
        
        body.light-mode .name {
            background: linear-gradient(to right, #0f172a, #475569);
            -webkit-background-clip: text;
            text-shadow: none;
        }

        .role-tags {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.7rem;
        }

        .tag {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            backdrop-filter: blur(10px);
        }

        .bio {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
            max-width: 90%;
            margin: 0 auto;
        }

        /* --- LINKS STACK (Slim sleek cards) --- */
        .links-stack {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            animation: staggerSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 0.7rem 1.2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateX(10px);
            background: var(--glass-hover);
            border-color: rgba(236, 72, 153, 0.3);
            box-shadow: -5px 5px 20px rgba(0,0,0,0.05);
        }

        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-right: 1rem;
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            transition: transform 0.4s ease, background 0.4s ease, color 0.4s ease;
        }

        body.light-mode .icon-box {
            background: rgba(0,0,0,0.03);
        }

        .link-card:hover .icon-box {
            background: var(--accent);
            color: white;
            border-color: transparent;
            transform: rotate(10deg);
        }

        .link-text {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .link-title {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .link-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .link-arrow {
            font-size: 1rem;
            color: var(--text-muted);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .link-card:hover .link-arrow {
            opacity: 1;
            transform: translateX(0);
            color: var(--accent);
        }

        /* HIGHLIGHT CARD */
        .highlight-card {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.08), rgba(99, 102, 241, 0.08));
            border: 1px solid rgba(236, 72, 153, 0.2);
        }
        
        .highlight-card .icon-box {
            background: linear-gradient(135deg, #ec4899, #6366f1);
            color: white;
            border: none;
        }

        /* GRID FOR SOCIALS */
        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }

        .social-mini {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.8rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
        }

        .social-mini:hover {
            background: var(--glass-hover);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.2);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes staggerSlideUp {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Yana ham mukammal joylashishi uchun */
        @media (max-height: 700px) {
            .hero-section { height: 45vh; }
            .content-section { height: 55vh; padding-top: 0; margin-top: -50px; }
            .name { font-size: 1.8rem; margin-bottom: 0.1rem; }
            .bio { font-size: 0.75rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
            .icon-box { width: 35px; height: 35px; font-size: 1rem; margin-right: 0.7rem; }
            .link-card { padding: 0.6rem 1rem; }
            .social-mini { padding: 0.6rem; }
            .links-stack { gap: 0.5rem; }
        }
    </style>
</head>
<body>

    <!-- MAMMOTH HERO SECTION -->
    <div class="hero-section">
        <!-- Eng yuqori did bilan ishlangan kinematik rasm -->
        <img src="profile.jpg" alt="Bekhzod Ikramov" class="hero-img" fetchpriority="high">
        <!-- Rasmning silliq qora fonga (yada oq fonga) o'tib ketishi -->
        <div class="hero-fade"></div>
        
        <button class="theme-toggle" id="themeToggleBtn">
            <i class="fas fa-sun" id="themeIcon"></i>
        </button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content-section">
        
        <div class="profile-info">
            <!-- Juda chiroyli Playfair fontidagi ism -->
            <h1 class="name">Bekhzod Ikramov</h1>
            <div class="role-tags">
                <span class="tag">CEO</span>
                <span class="tag">COO</span>
                <span class="tag">IT Manager</span>
            </div>
            <p class="bio">12+ yillik tajriba. Sobiq PDP Academy direktori. O'zbekistondagi vizyoner va professional ekspert.</p>
        </div>

        <!-- Yana ham ingichka, nafis linklar -->
        <div class="links-stack" id="linksStack">
            
            <div class="social-row">
                <a href="#" class="social-mini" data-tilt data-tilt-scale="1.05">
                    <i class="fab fa-linkedin" style="color: #3b82f6;"></i> LinkedIn
                </a>
                <a href="https://t.me/Bekhzodikramov" class="social-mini" data-tilt data-tilt-scale="1.05">
                    <i class="fab fa-telegram" style="color: #0ea5e9;"></i> Telegram
                </a>
            </div>

            <a href="#" class="link-card" data-tilt data-tilt-max="5">
                <div class="icon-box"><i class="fas fa-briefcase"></i></div>
                <div class="link-text">
                    <span class="link-title">Fikr Yetakchilari</span>
                    <span class="link-subtitle">Operatsion Direktor (COO)</span>
                </div>
                <i class="fas fa-arrow-right link-arrow"></i>
            </a>

            <a href="#" class="link-card" data-tilt data-tilt-max="5">
                <div class="icon-box"><i class="fas fa-building"></i></div>
                <div class="link-text">
                    <span class="link-title">PDP Academy</span>
                    <span class="link-subtitle">Sobiq Bosh Direktor (CEO)</span>
                </div>
                <i class="fas fa-arrow-right link-arrow"></i>
            </a>

            <a href="#" class="link-card highlight-card" data-tilt data-tilt-max="5">
                <div class="icon-box"><i class="fas fa-chart-line"></i></div>
                <div class="link-text">
                    <span class="link-title">Ko'rsatkichlar va Portfolio</span>
                    <span class="link-subtitle">1700% ROMI & Kuchli Networking</span>
                </div>
                <i class="fas fa-arrow-right link-arrow"></i>
            </a>
        </div>
    </div>

    <!-- JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

    <!-- Theme Logic -->
    <script>
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            body.classList.add('light-mode');
            themeIcon.classList.replace('fa-sun', 'fa-moon');
        }

        themeToggleBtn.addEventListener('click', () => {
            themeIcon.style.transform = "rotate(360deg)";
            setTimeout(() => { themeIcon.style.transform = "rotate(0deg)"; }, 300);

            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            } else {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
